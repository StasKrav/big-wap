<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <title>Web Audio Player</title>
</head>

<body>
    <div class="player">
        <div class="player-header">
            <div class="player-title">WAP</div>
            <div class="playlist-controls">
                <button class="btn" id="addFilesBtn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z"/>
                    </svg>
                </button>
                <button class="btn" id="addFolderBtn">
                    <svg width="20" height="20" viewBox="0 0 544 480" xmlns="http://www.w3.org/2000/svg">
                    <path d="M80,144 L464,144 L464,400 L80,400 Z" stroke="currentColor" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M80,80 L80,144" stroke="currentColor" stroke-width="22" fill="none" stroke-linecap="round"/>
                    <path d="M80,80 L208,80" stroke="currentColor" stroke-width="20" fill="none" stroke-linecap="round"/>
                    <path d="M208,80 L272,144" stroke="currentColor" stroke-width="20" fill="none" stroke-linecap="round"/>
                    
                    </svg>
                    
                </button>
                <button class="btn" id="clearPlaylistBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aa648c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18"/>
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                        <path d="M8 4V2h8v2"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="now-playing">
            <div class="track-info">
                <div class="track-title" id="currentTrackTitle">Выберите трек</div>
                <div class="track-artist" id="currentTrackArtist">Нет активного трека</div>
            </div>
            
            <div class="progress-container">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress" style="width: 0%"></div>
                </div>
                <span class="time" id="duration">0:00</span>
            </div>

            <div class="controls">
                 <!-- Левая группа (пустая заглушка для центрирования) -->
                 <div class="controls-left"></div>
             
                 <!-- Центральная группа: навигация и перемотка -->
                 <div class="controls-center">
                     <div class="controls-group">
                         <button class="control-btn" id="prevBtn" title="Предыдущий трек (Ctrl+←)">
                             <svg width="20" height="20" viewBox="0 0 288 288" xmlns="http://www.w3.org/2000/svg">
                             <path d="M208,80 L208,208" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                             <path d="M208,80 L112,144" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                             <path d="M112,144 L208,208" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                             <path d="M80,80 L80,208" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                             </svg>
                         </button>
                     </div>
             
                     <div class="controls-group">
                         <button class="control-btn" id="rewind10Btn" title="Назад 10 сек (Shift+←)">
                             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                 <polyline points="19 18 13 12 19 6"/>
                                 <polyline points="11 18 5 12 11 6"/>
                             </svg>
                         </button>
                         <button class="control-btn" id="rewind1Btn" title="Назад 1 сек (←)">
                             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                 <polyline points="15 18 9 12 15 6"/>
                             </svg>
                         </button>
                     </div>
             
                     <!-- Центральная группа: Play/Pause + Stop -->
                     <div class="controls-group">
                         <button class="play-btn" id="playBtn">
                             <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="playIcon">
                                 <path d="M8 5v14l11-7z"/>
                             </svg>
                         </button>
                         <button class="control-btn stop-btn" id="stopBtn" title="Стоп (S)">
                             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                 <rect x="6" y="6" width="12" height="12" rx="1"/>
                             </svg>
                         </button>
                     </div>
             
                     <!-- Правая группа: перемотка вперед и навигация -->
                     <div class="controls-group">
                         <button class="control-btn" id="forward1Btn" title="Вперед 1 сек (→)">
                             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                 <polyline points="9 18 15 12 9 6"/>
                             </svg>
                         </button>
                         <button class="control-btn" id="forward10Btn" title="Вперед 10 сек (Shift+→)">
                             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                 <polyline points="5 18 11 12 5 6"/>
                                 <polyline points="13 18 19 12 13 6"/>
                             </svg>
                         </button>
                         <button class="control-btn" id="nextBtn" title="Следующий трек (Ctrl+→)">
                             <svg width="20" height="20" viewBox="0 0 288 288" xmlns="http://www.w3.org/2000/svg">
                             <path d="M80,80 L176,144" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                             <path d="M176,144 L80,208" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                             <path d="M80,80 L80,208" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                             <path d="M208,80 L208,208" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                             
                             </svg>
                         </button>
                     </div>
                 </div>
             
                 <!-- Правая группа: громкость -->
                 <div class="controls-right">
                     <div class="volume-wrapper">
                         <button class="volume-toggle" id="volumeToggle" title="Громкость">
                             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                 <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                                 <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                                 <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                             </svg>
                             <span class="volume-percent" id="volumePercent">80%</span>
                         </button>
                         
                         <div class="volume-popup" id="volumePopup">
                             <div class="volume-popup-content">
                                 <button class="volume-mute-btn" id="muteBtn" title="Выключить звук">
                                     <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                         <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                                         <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                                         <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                     </svg>
                                 </button>
                                 <input type="range" id="volumeSlider" class="volume-slider" 
                                        min="0" max="1" step="0.01" value="0.8">
                                 <span class="volume-value" id="volumeValue">80%</span>
                             </div>
                         </div>
                     </div>
                 </div>
             </div>
       

        <div class="playlist-container" id="playlist">
            <div class="empty-state">
                <p>Плейлист пуст</p>
                <p style="font-size: 14px;">Добавьте аудиофайлы для воспроизведения</p>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" class="file-input" accept="audio/*" multiple>
    <input type="file" id="folderInput" class="file-input" webkitdirectory directory multiple>

<script src="js/toast.js"></script>
<script src="js/storage.js"></script>
<script src="js/main.js"></script>

</body>
</html>
